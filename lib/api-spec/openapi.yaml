openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: TradeCore Pro - Binance Spot Trading Bot API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: >-
      Authentication (Multi-user Phase). Each user registers their own
      account (username/password) — see middleware/auth.ts for the full
      design rationale.
  - name: credentials
    description: >-
      Per-user Binance API credential management (Multi-user Phase) —
      encrypted at rest, linked only to the owning account.
  - name: bot
    description: Bot control operations
  - name: scanner
    description: Live market scanner
  - name: market
    description: Live market monitor and connection health
  - name: trades
    description: Trade log operations
  - name: stats
    description: Performance statistics
  - name: memory
    description: Adaptive learning memory
  - name: config
    description: Bot configuration
  - name: strategies
    description: Multi-strategy management and performance

# Every operation requires ONE of these by default (either is sufficient —
# see components.securitySchemes below). /healthz and /auth/* override this
# with their own empty `security: []` since they must stay reachable without
# credentials (health checks, and obtaining credentials in the first place).
security:
  - sessionCookie: []
  - basicAuth: []

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      security: []
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create a new account
      security: []
      description: >-
        Multi-user Phase: creates a new account (username + password, hashed
        with scrypt) and immediately logs in, setting the same signed
        session cookie POST /auth/login issues. Each account only ever risks
        its own Binance credentials/funds, so registration is open to
        anyone who can reach the app.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 64
                password:
                  type: string
                  minLength: 12
      responses:
        "201":
          description: Account created — session cookie set
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "400":
          description: Invalid username or password
        "409":
          description: Username already taken

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in to an existing account
      security: []
      description: >-
        Exchanges a user's username/password for a signed session cookie
        (12h expiry). Rate-limited separately and much more strictly than
        the rest of the API (10 attempts / 15 min / IP) since this is the
        one meaningful brute-force target on an otherwise-authenticated API.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        "200":
          description: Logged in — session cookie set
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        "401":
          description: Invalid username or password

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Clear the session cookie
      security: []
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /auth/status:
    get:
      operationId: getAuthStatus
      tags: [auth]
      summary: Check whether the current request is authenticated
      security: []
      description: >-
        Lets the frontend check auth state on load without risking a 401
        (and without the global rate limiter mistaking routine polling for
        abuse).
      responses:
        "200":
          description: Auth status
          content:
            application/json:
              schema:
                type: object
                required: [authenticated]
                properties:
                  authenticated:
                    type: boolean

  /bot/status:
    get:
      operationId: getBotStatus
      tags: [bot]
      summary: Get bot status
      description: Returns the current bot runtime state
      responses:
        "200":
          description: Bot status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/start:
    post:
      operationId: startBot
      tags: [bot]
      summary: Start the bot
      description: Starts the trading bot engine
      responses:
        "200":
          description: Bot started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/stop:
    post:
      operationId: stopBot
      tags: [bot]
      summary: Stop the bot
      description: Stops the trading bot engine
      responses:
        "200":
          description: Bot stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotStatus"

  /bot/reset-risk-pause:
    post:
      operationId: resetRiskPause
      tags: [bot]
      summary: Clear the consecutive-risk-violation trading pause
      description: >-
        Trading auto-pauses after 3 consecutive risk violations (realized loss
        exceeding the planned maximum). This clears the violation counter so
        trading resumes on the next scan. Review the flagged trades on the
        Trade Log before resetting.
      responses:
        "200":
          description: Risk pause cleared (or was not active)
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string

  /scanner:
    get:
      operationId: getScannerData
      tags: [scanner]
      summary: Get live scanner table
      description: Returns current scanner rows for all watched pairs
      responses:
        "200":
          description: Scanner rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScannerRow"

  /bot/decisions:
    get:
      operationId: getBotDecisions
      tags: [bot]
      summary: Get strategy decision trace
      description: Returns the full per-symbol pipeline decision (market data → indicators → signal → risk → order) from the most recent scan
      responses:
        "200":
          description: Decision trace rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SymbolDecision"

  /decisions:
    get:
      operationId: getDecisionJournal
      tags: [bot]
      summary: Get the persistent strategy decision journal
      description: >
        Every trade a strategy genuinely considered — executed, approved but
        not taken (lost allocation / portfolio risk / order failure), or
        rejected by the strategy's own reasoning — with the full written
        DecisionReport. Newest first.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, minimum: 1, maximum: 200, default: 50 }
        - name: before
          in: query
          description: Return rows with id lower than this (cursor pagination)
          schema: { type: integer }
        - name: kind
          in: query
          schema: { type: string, enum: [executed, approved_not_taken, rejected] }
        - name: strategyId
          in: query
          schema: { type: string }
        - name: symbol
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Decision journal rows, newest first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyDecisionEntry"

  /bot/blocking-summary:
    get:
      operationId: getBlockingSummary
      tags: [bot]
      summary: Get blocking summary
      description: Aggregated explanation of why trades are or are not being executed
      responses:
        "200":
          description: Blocking summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlockingSummary"

  /market/live:
    get:
      operationId: getMarketLive
      tags: [market]
      summary: Get live market monitor
      description: Returns real-time ticker snapshots and exchange connection health
      responses:
        "200":
          description: Live market monitor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketMonitor"

  /trades:
    get:
      operationId: getTrades
      tags: [trades]
      summary: List all trades
      description: Returns trade log with optional status and source filter
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, closed, stopped]
        - name: source
          in: query
          required: false
          schema:
            type: string
            enum: [live, backtest]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 500
      responses:
        "200":
          description: Trade list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trade"

  /trades/{id}:
    get:
      operationId: getTrade
      tags: [trades]
      summary: Get trade by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Trade detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trade"
        "404":
          description: Trade not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [stats]
      summary: Get performance summary
      description: Returns aggregate stats including win rate and total PnL
      responses:
        "200":
          description: Performance summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

  /stats/daily:
    get:
      operationId: getDailyStats
      tags: [stats]
      summary: Get daily statistics
      description: Returns today's hourly trading breakdown
      responses:
        "200":
          description: Daily stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyStats"

  /reports/daily:
    get:
      operationId: getDailyReport
      tags: [stats]
      summary: Get the daily trade report
      description: >-
        Full report for one UTC calendar day — summary, per-strategy and
        per-symbol breakdowns, exit reasons, and every closed trade. The same
        report is pushed to the alert webhook automatically at UTC midnight
        for the day that just ended.
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            pattern: '^\d{4}-\d{2}-\d{2}$'
          description: "UTC day, YYYY-MM-DD. Defaults to today."
      responses:
        "200":
          description: Daily report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"

  /stats/hourly:
    get:
      operationId: getHourlyStats
      tags: [stats]
      summary: Get hourly PnL breakdown
      description: Returns per-hour performance data used for toxic hour detection
      responses:
        "200":
          description: Hourly breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HourlyStat"

  /memory/blacklist:
    get:
      operationId: getBlacklist
      tags: [memory]
      summary: Get blacklisted symbols
      description: Returns symbols currently blacklisted by the adaptive learning engine
      responses:
        "200":
          description: Blacklist entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlacklistEntry"

  /memory/toxic-hours:
    get:
      operationId: getToxicHours
      tags: [memory]
      summary: Get toxic hours
      description: Returns UTC hours blocked by the adaptive learning engine
      responses:
        "200":
          description: Toxic hour list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToxicHour"

  /config:
    get:
      operationId: getConfig
      tags: [config]
      summary: Get bot configuration
      responses:
        "200":
          description: Current config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfig"

    put:
      operationId: updateConfig
      tags: [config]
      summary: Update bot configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BotConfigUpdate"
      responses:
        "200":
          description: Updated config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BotConfig"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /me/binance-credentials:
    get:
      operationId: getBinanceCredentials
      tags: [credentials]
      summary: Get the logged-in user's Binance credential status
      description: >-
        Never returns the plaintext API key/secret — only whether one is
        configured and a masked preview (last 4 chars of the key).
      responses:
        "200":
          description: Credential status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinanceCredentialsStatus"

    put:
      operationId: setBinanceCredentials
      tags: [credentials]
      summary: Set the logged-in user's Binance API key/secret
      description: >-
        Encrypted at rest (AES-256-GCM) and linked only to the logged-in
        user's account. The bot engine only reads credentials at start(), so
        restart the bot (if running) for a changed credential to take effect.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [apiKey, apiSecret]
              properties:
                apiKey:
                  type: string
                apiSecret:
                  type: string
      responses:
        "200":
          description: Credentials updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinanceCredentialsStatus"
        "400":
          description: apiKey/apiSecret missing

    delete:
      operationId: deleteBinanceCredentials
      tags: [credentials]
      summary: Remove the logged-in user's stored Binance credentials
      responses:
        "200":
          description: Credentials removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BinanceCredentialsStatus"

  /me/oanda-credentials:
    get:
      operationId: getOandaCredentials
      tags: [credentials]
      summary: Get the logged-in user's OANDA credential status (forex section)
      description: >-
        Never returns the plaintext token/account id — only whether one is
        configured and a masked preview (last 4 chars of the account id).
      responses:
        "200":
          description: Credential status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OandaCredentialsStatus"

    put:
      operationId: setOandaCredentials
      tags: [credentials]
      summary: Set the logged-in user's OANDA API token + account id
      description: >-
        Encrypted at rest (AES-256-GCM), same scheme as the Binance keys.
        Practice vs live is decided by the forex section's paper-trading
        toggle at engine start — each OANDA environment only accepts its own
        tokens. Restart the forex engine for a changed credential to apply.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [apiToken, accountId]
              properties:
                apiToken:
                  type: string
                accountId:
                  type: string
      responses:
        "200":
          description: Credentials updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OandaCredentialsStatus"
        "400":
          description: apiToken/accountId missing

    delete:
      operationId: deleteOandaCredentials
      tags: [credentials]
      summary: Remove the logged-in user's stored OANDA credentials
      responses:
        "200":
          description: Credentials removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OandaCredentialsStatus"

  /backtests/autopsy:
    post:
      operationId: startAutopsy
      tags: [backtests]
      summary: Start an Optimization Autopsy for one strategy (async)
      description: >-
        Sweeps the strategy's real tunable knobs (dollar risk/target,
        confidence, hold time) with the live-parity backtest engine and
        walk-forward validates candidates on a held-out window before any
        suggestion is made. Crypto section only. Poll GET
        /backtests/autopsy/{id} for progress and the final diagnosis.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [strategyId]
              properties:
                strategyId:
                  type: string
                symbols:
                  type: array
                  items: { type: string }
                  description: "Defaults to your configured crypto pairs (max 4)."
                timeframe:
                  type: string
                  description: "Default 5m."
                days:
                  type: integer
                  description: "Total window length (train = first ⅔, validation = last ⅓). Default 45, range 14-120."
      responses:
        "202":
          description: Autopsy started
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: { type: integer }
                  status: { type: string }
        "400":
          description: Invalid request (unknown strategy, or forex section)
    get:
      operationId: listAutopsies
      tags: [backtests]
      summary: Recent Optimization Autopsies for the logged-in user
      responses:
        "200":
          description: Autopsy runs, newest first (max 20)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AutopsyRun"

  /backtests/autopsy/{id}:
    get:
      operationId: getAutopsy
      tags: [backtests]
      summary: One Optimization Autopsy (poll while running)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        "200":
          description: The autopsy run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AutopsyRun"
        "404":
          description: Not found

  /backtests:
    get:
      operationId: listBacktests
      tags: [backtests]
      summary: List all backtest runs
      responses:
        "200":
          description: List of backtest runs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BacktestRun"

  /backtests/run:
    post:
      operationId: runBacktest
      tags: [backtests]
      summary: Start a new backtest (async)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BacktestRunRequest"
      responses:
        "202":
          description: Backtest started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestStarted"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /backtests/optimize:
    post:
      operationId: optimizeBacktest
      tags: [backtests]
      summary: Start parameter optimization (async)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OptimizeRequest"
      responses:
        "202":
          description: Optimization started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestStarted"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /backtests/{id}:
    get:
      operationId: getBacktest
      tags: [backtests]
      summary: Get backtest run detail (run + trades + equity curve)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Backtest detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BacktestDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteBacktest
      tags: [backtests]
      summary: Delete a backtest run and all its data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /strategies:
    get:
      operationId: getStrategies
      tags: [strategies]
      summary: List all strategies with config and performance
      description: Returns all 6 built-in strategies with their current configuration and lifetime performance metrics
      responses:
        "200":
          description: Strategy list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategyInfo"

  /custom-strategies:
    get:
      operationId: getCustomStrategies
      tags: [strategies]
      summary: List this user's custom strategies (section-scoped)
      responses:
        "200":
          description: Custom strategy list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomStrategy"
    post:
      operationId: createCustomStrategy
      tags: [strategies]
      summary: Create a custom strategy (no-code builder)
      description: Rules are validated server-side against the builder's bounded indicator vocabulary. The new strategy starts DISABLED with no dollar plan, and must complete a single-strategy backtest before it can be enabled for live trading.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomStrategyCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomStrategy"
        "400":
          description: Invalid name or rules, or per-section limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /custom-strategies/{id}:
    put:
      operationId: updateCustomStrategy
      tags: [strategies]
      summary: Update a custom strategy
      description: Editing the rules resets the backtest stamp — the strategy must be re-backtested before it can be (re-)enabled for live trading.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CustomStrategyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CustomStrategy"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteCustomStrategy
      tags: [strategies]
      summary: Delete a custom strategy (and its risk/exit config)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [success, strategyId]
                properties:
                  success:
                    type: boolean
                  strategyId:
                    type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /strategies/signals:
    get:
      operationId: getStrategySignals
      tags: [strategies]
      summary: Live ranked opportunity signals
      description: Returns the most recent scanner results enriched with the strategy that fired
      responses:
        "200":
          description: Ranked signal list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StrategySignalItem"

  /strategies/{id}:
    put:
      operationId: updateStrategyConfig
      tags: [strategies]
      summary: Update strategy configuration
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StrategyConfigUpdate"
      responses:
        "200":
          description: Updated configuration
          content:
            application/json:
              schema:
                type: object
                required: [success, strategyId]
                properties:
                  success:
                    type: boolean
                  strategyId:
                    type: string
        "404":
          description: Strategy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /backtests/{id}/export:
    get:
      operationId: exportBacktest
      tags: [backtests]
      summary: Export backtest trades as CSV or JSON
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: format
          in: query
          schema:
            type: string
            enum: [json, csv]
            default: json
      responses:
        "200":
          description: Export data
          content:
            application/json:
              schema:
                type: object
            text/csv:
              schema:
                type: string
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: tc_session
      description: >-
        Signed, stateless session cookie set by POST /auth/login. Used by
        the web dashboard — the browser attaches it automatically.
    basicAuth:
      type: http
      scheme: basic
      description: >-
        `Authorization: Basic <base64(OPERATOR_USERNAME:OPERATOR_PASSWORD)>`
        — for scripts, curl, or a non-browser client. Same shared credentials
        as sessionCookie; this is just the non-cookie way to present them.
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    BotStatus:
      type: object
      required: [running, dailyPnl, openPositions, totalTradesToday, winRateToday, circuitBreakerActive, riskPaused, mode]
      properties:
        running:
          type: boolean
        balanceUsdt:
          type: ["number", "null"]
          description: "Free USDT on the connected exchange environment; null when the engine is stopped."
        dailyPnl:
          type: number
        openPositions:
          type: integer
        totalTradesToday:
          type: integer
        winRateToday:
          type: number
        circuitBreakerActive:
          type: boolean
        riskPaused:
          type: boolean
          description: "True when trading is suspended after 3 consecutive risk violations — see POST /bot/reset-risk-pause."
        mode:
          type: string
          enum: [live, testnet, backtest]
        startedAt:
          type: ["string", "null"]
          format: date-time
        lastScanAt:
          type: ["string", "null"]
          format: date-time

    IndicatorVote:
      type: object
      required: [name, signal, weight, value]
      properties:
        name:
          type: string
        signal:
          type: string
          enum: [bullish, bearish, neutral]
        weight:
          type: number
        value:
          type: number

    ScannerRow:
      type: object
      required: [symbol, confidence, rsi, atrPercent, status, ema5AboveEma20, macroBullish, volumeRatio, regime, adx, macdHistogram, atrAbs, votes]
      properties:
        symbol:
          type: string
        confidence:
          type: number
        rsi:
          type: number
        atrPercent:
          type: number
        status:
          type: string
          enum: [watching, entered, blacklisted, skipped]
        ema5AboveEma20:
          type: boolean
        macroBullish:
          type: boolean
        volumeRatio:
          type: number
        lastPrice:
          type: number
        regime:
          type: string
          enum: [strong_trend, weak_trend, range, high_volatility, low_volatility]
        adx:
          type: number
        macdHistogram:
          type: number
        atrAbs:
          type: number
        votes:
          type: array
          items:
            $ref: "#/components/schemas/IndicatorVote"
        strategyId:
          type: string
        strategyName:
          type: string
        entryReason:
          type: string
        side:
          type: string
          enum: [long, short]

    PipelineStage:
      type: object
      required: [name, status, detail]
      properties:
        name:
          type: string
        status:
          type: string
          enum: [pass, fail, skip]
        detail:
          type: string
        data:
          type: object
          additionalProperties: true

    SymbolDecision:
      type: object
      required: [symbol, timestamp, confidence, finalDecision, blockStage, blockReason, stages]
      properties:
        symbol:
          type: string
        timestamp:
          type: string
        confidence:
          type: number
        finalDecision:
          type: string
          enum: [ENTERED, BLOCKED]
        blockStage:
          type: ["string", "null"]
        blockReason:
          type: ["string", "null"]
        stages:
          type: array
          items:
            $ref: "#/components/schemas/PipelineStage"

    StrategyDecisionEntry:
      type: object
      required: [id, createdAt, symbol, strategyId, kind, occurrences, lastSeenAt]
      properties:
        id:
          type: integer
        createdAt:
          type: string
        symbol:
          type: string
        strategyId:
          type: string
        strategyName:
          type: ["string", "null"]
        kind:
          type: string
          enum: [executed, approved_not_taken, rejected]
        side:
          type: ["string", "null"]
        confidence:
          type: ["number", "null"]
        stage:
          type: ["string", "null"]
        reason:
          type: ["string", "null"]
        report:
          description: DecisionReport for rejections; the full TradePlan for approved/executed decisions.
          type: ["object", "null"]
          additionalProperties: true
        tradeId:
          type: ["integer", "null"]
        occurrences:
          type: integer
        lastSeenAt:
          type: string

    LiveTicker:
      type: object
      required: [symbol, last, bid, ask, spread, spreadPercent, baseVolume, quoteVolume, changePercent, timestamp]
      properties:
        symbol:
          type: string
        last:
          type: number
        bid:
          type: number
        ask:
          type: number
        spread:
          type: number
        spreadPercent:
          type: number
        baseVolume:
          type: number
        quoteVolume:
          type: number
        changePercent:
          type: number
        timestamp:
          type: number

    ConnectionStatus:
      type: object
      required: [connected, mode, exchange, marketsLoaded, credentialsVerified, lastTickerFetchAt, lastTickerLatencyMs, lastError]
      properties:
        connected:
          type: boolean
        mode:
          type: string
          enum: [live, testnet, backtest]
        exchange:
          type: string
        marketsLoaded:
          type: integer
        credentialsVerified:
          type: boolean
        lastTickerFetchAt:
          type: ["string", "null"]
        lastTickerLatencyMs:
          type: ["number", "null"]
        lastError:
          type: ["string", "null"]

    MarketMonitor:
      type: object
      required: [connection, tickers]
      properties:
        connection:
          $ref: "#/components/schemas/ConnectionStatus"
        tickers:
          type: array
          items:
            $ref: "#/components/schemas/LiveTicker"

    BlockingReason:
      type: object
      required: [stage, reason, count, symbols]
      properties:
        stage:
          type: string
        reason:
          type: string
        count:
          type: integer
        symbols:
          type: array
          items:
            type: string

    BlockingSummary:
      type: object
      required: [tradingActive, running, globalBlock, entered, totalEvaluated, reasons, lastScanAt]
      properties:
        tradingActive:
          type: boolean
        running:
          type: boolean
        globalBlock:
          type: ["string", "null"]
        entered:
          type: integer
        totalEvaluated:
          type: integer
        reasons:
          type: array
          items:
            $ref: "#/components/schemas/BlockingReason"
        lastScanAt:
          type: ["string", "null"]

    Trade:
      type: object
      required: [id, symbol, side, entryPrice, quantity, status, confidence, stopLoss, takeProfit, entryTime]
      properties:
        id:
          type: integer
        symbol:
          type: string
        side:
          type: string
          enum: [buy, sell]
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        quantity:
          type: number
        pnl:
          type: ["number", "null"]
        status:
          type: string
          enum: [open, closed, stopped]
        confidence:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        entryTime:
          type: string
          format: date-time
        exitTime:
          type: ["string", "null"]
          format: date-time
        exitReason:
          type: ["string", "null"]
          # "timeout" is the on-the-wire value for the Phase 4 TIME_LIMIT exit —
          # see lib/exitTypes.ts for the canonical mapping.
          enum: [take_profit, stop_loss, signal_exit, timeout, break_even, trailing_stop, manual, emergency_stop, circuit_breaker, reconciled_missing, null]
        isBacktest:
          type: boolean
        plannedStopLoss:
          type: ["number", "null"]
        plannedTakeProfit:
          type: ["number", "null"]
        plannedQuantity:
          type: ["number", "null"]
        feesUsdt:
          type: ["number", "null"]
        slippageUsdt:
          type: ["number", "null"]
        holdingSeconds:
          type: ["integer", "null"]
        grossPnl:
          type: ["number", "null"]
        remainingQuantity:
          type: ["number", "null"]
        tp1Price:
          type: ["number", "null"]
        tp1Quantity:
          type: ["number", "null"]
        tp1Filled:
          type: boolean
        tp1FillPrice:
          type: ["number", "null"]
        tp2Price:
          type: ["number", "null"]
        tp2Quantity:
          type: ["number", "null"]
        tp2Filled:
          type: boolean
        tp2FillPrice:
          type: ["number", "null"]
        breakEvenActive:
          type: boolean
        trailingStopActive:
          type: boolean
        trailingStopMode:
          type: ["string", "null"]

    StatsSummary:
      type: object
      required: [totalTrades, winRate, totalPnl, maxDrawdown, avgConfidence, bestTrade, worstTrade, streakCurrent, streakType]
      properties:
        totalTrades:
          type: integer
        winRate:
          type: number
        totalPnl:
          type: number
        maxDrawdown:
          type: number
        avgConfidence:
          type: number
        bestTrade:
          type: number
        worstTrade:
          type: number
        streakCurrent:
          type: integer
        streakType:
          type: string
          enum: [win, loss, none]

    DailyStats:
      type: object
      required: [date, tradesCount, winRate, totalPnl, openPositions, circuitBreakerHit]
      properties:
        date:
          type: string
        tradesCount:
          type: integer
        winRate:
          type: number
        totalPnl:
          type: number
        openPositions:
          type: integer
        circuitBreakerHit:
          type: boolean
        hourlyBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/HourlyStat"

    DailyReport:
      type: object
      required: [date, generatedAt, summary, byStrategy, bySymbol, exitReasons, trades]
      properties:
        date:
          type: string
        generatedAt:
          type: string
          format: date-time
        summary:
          type: object
          required: [totalTrades, wins, losses, winRate, totalPnl, totalFeesUsdt, bestTrade, worstTrade, openPositions]
          properties:
            totalTrades:
              type: integer
            wins:
              type: integer
            losses:
              type: integer
            winRate:
              type: number
            totalPnl:
              type: number
            totalFeesUsdt:
              type: number
            bestTrade:
              type: number
            worstTrade:
              type: number
            openPositions:
              type: integer
        byStrategy:
          type: array
          items:
            type: object
            required: [strategyName, trades, wins, pnl]
            properties:
              strategyName:
                type: string
              trades:
                type: integer
              wins:
                type: integer
              pnl:
                type: number
        bySymbol:
          type: array
          items:
            type: object
            required: [symbol, trades, wins, pnl]
            properties:
              symbol:
                type: string
              trades:
                type: integer
              wins:
                type: integer
              pnl:
                type: number
        exitReasons:
          type: object
          additionalProperties:
            type: integer
        trades:
          type: array
          items:
            type: object
            required: [id, symbol, side, entryTime, entryPrice, quantity]
            properties:
              id:
                type: integer
              symbol:
                type: string
              side:
                type: string
              strategyName:
                type: ["string", "null"]
              entryTime:
                type: string
                format: date-time
              exitTime:
                type: ["string", "null"]
                format: date-time
              entryPrice:
                type: number
              exitPrice:
                type: ["number", "null"]
              quantity:
                type: number
              pnl:
                type: ["number", "null"]
              exitReason:
                type: ["string", "null"]

    HourlyStat:
      type: object
      required: [hour, pnl, tradeCount, winRate, isToxic]
      properties:
        hour:
          type: integer
        pnl:
          type: number
        tradeCount:
          type: integer
        winRate:
          type: number
        isToxic:
          type: boolean

    BlacklistEntry:
      type: object
      required: [symbol, winRate, tradeCount, blacklistedAt, expiresAt]
      properties:
        symbol:
          type: string
        winRate:
          type: number
        tradeCount:
          type: integer
        blacklistedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time

    ToxicHour:
      type: object
      required: [hour, cumulativePnl, tradeCount, blockedAt]
      properties:
        hour:
          type: integer
        cumulativePnl:
          type: number
        tradeCount:
          type: integer
        blockedAt:
          type: string
          format: date-time

    BotConfig:
      type: object
      required: [positionSizeUsdt, riskPercent, maxOpenPositions, maxPortfolioRiskPercent, dailyLossLimitUsdt, confidenceThreshold, riskModel, stopLossPercent, takeProfitPercent, maxLossUsdt, targetProfitUsdt, cooldownMinutes, scanIntervalSeconds, pairs, testnet, backtestMode, highFrequencyTestMode, marketType, leverage, marginMode, broker]
      properties:
        broker:
          type: string
          enum: [binance, oanda]
          description: "Which broker this section's engine connects to — binance (crypto section) or oanda (forex section). Fixed per section, not user-editable."
        marketType:
          type: string
          enum: [spot, futures, forex]
          description: "Spot (no leverage, long-only), USDⓈ-M Futures (leveraged, long+short), or forex (OANDA, margin-based)"
        leverage:
          type: integer
          description: "Futures leverage multiplier. Ignored in spot mode (always 1)."
        marginMode:
          type: string
          enum: [isolated, cross]
          description: "Futures margin mode. Ignored in spot mode."
        positionSizeUsdt:
          type: number
        riskPercent:
          type: number
          description: "% of account balance to risk per trade (0 = fixed positionSizeUsdt)"
        maxOpenPositions:
          type: integer
        maxPortfolioRiskPercent:
          type: number
          description: "Maximum % of total balance across all open positions"
        dailyLossLimitUsdt:
          type: number
        confidenceThreshold:
          type: integer
        riskModel:
          type: string
          enum: [percent, dollar]
          description: "How SL/TP are decided. 'percent': SL/TP are a % of price (stopLossPercent/takeProfitPercent) and size comes from riskPercent/positionSizeUsdt. 'dollar': SL/TP prices and size are derived from a fixed max-dollar-loss and target-dollar-profit per trade (maxLossUsdt/targetProfitUsdt)."
        stopLossPercent:
          type: number
          description: "Stop-loss distance as a % below entry price (used when riskModel = percent)"
        takeProfitPercent:
          type: number
          description: "Take-profit distance as a % above entry price (used when riskModel = percent)"
        maxLossUsdt:
          type: number
          description: "Dollar mode: max dollars to lose on one trade (net of fees)"
        targetProfitUsdt:
          type: number
          description: "Dollar mode: desired dollar profit on one trade (net of fees)"
        cooldownMinutes:
          type: integer
        scanIntervalSeconds:
          type: integer
        pairs:
          type: array
          items:
            type: string
        testnet:
          type: boolean
        backtestMode:
          type: boolean
        highFrequencyTestMode:
          type: boolean
          description: "Testnet/demo only: when on, the live engine overrides its turnover-limiting gates (cooldown, confidence floor, toxic hours, max positions, daily-loss breaker, max holding time) to generate a high volume of trades for end-to-end testing. Ignored on real-money keys. Not a profitable configuration."
        alertWebhookUrl:
          type: string
          nullable: true
          description: "Discord / Telegram / Slack incoming-webhook URL for risk alerts"

    BotConfigUpdate:
      type: object
      properties:
        marketType:
          type: string
          enum: [spot, futures, forex]
        leverage:
          type: integer
          minimum: 1
          maximum: 125
          description: "Futures leverage multiplier (1 = no leverage). Ignored in spot mode."
        marginMode:
          type: string
          enum: [isolated, cross]
        positionSizeUsdt:
          type: number
          minimum: 1
          maximum: 1000000
        riskPercent:
          type: number
          minimum: 0
          maximum: 10
          description: "0 = fixed positionSizeUsdt instead of risk-based sizing. Capped at 10% per trade."
        maxOpenPositions:
          type: integer
          minimum: 1
          maximum: 50
        maxPortfolioRiskPercent:
          type: number
          minimum: 0.1
          maximum: 100
        dailyLossLimitUsdt:
          type: number
          minimum: 0
          description: "Stored as a positive magnitude; the circuit breaker trips when dailyPnl <= -this value."
        confidenceThreshold:
          type: integer
          minimum: 0
          maximum: 100
        riskModel:
          type: string
          enum: [percent, dollar]
          description: "percent = %-based SL/TP + riskPercent sizing; dollar = fixed max-loss/target-profit sizing (maxLossUsdt/targetProfitUsdt)."
        stopLossPercent:
          type: number
          minimum: 0.01
          maximum: 20
        takeProfitPercent:
          type: number
          minimum: 0.3
          maximum: 100
          description: "Must clear round-trip trading costs (~0.3% at default fee/slippage assumptions) — see lib/tradingCosts.ts. A lower value is a guaranteed net loss on every winning trade, confirmed empirically in the Phase 6 audit."
        maxLossUsdt:
          type: number
          minimum: 0.01
          maximum: 1000000
          description: "Dollar mode: max dollars to lose on one trade (net of fees)."
        targetProfitUsdt:
          type: number
          minimum: 0.01
          maximum: 1000000
          description: "Dollar mode: desired dollar profit on one trade (net of fees)."
        cooldownMinutes:
          type: integer
          minimum: 0
          maximum: 1440
        scanIntervalSeconds:
          type: integer
          minimum: 5
          maximum: 3600
        pairs:
          type: array
          items:
            type: string
        testnet:
          type: boolean
        backtestMode:
          type: boolean
        highFrequencyTestMode:
          type: boolean
          description: "Testnet/demo only: when on, the live engine overrides its turnover-limiting gates to generate a high volume of trades for end-to-end testing. Ignored on real-money keys."
        alertWebhookUrl:
          type: string
          nullable: true
          description: "Discord / Telegram / Slack incoming-webhook URL for risk alerts"

    BinanceCredentialsStatus:
      type: object
      required: [configured, apiKeyPreview, updatedAt]
      properties:
        configured:
          type: boolean
        apiKeyPreview:
          type: ["string", "null"]
          description: "Last 4 chars of the stored API key, e.g. \"...ab12\" — never the full key."
        updatedAt:
          type: ["string", "null"]
          format: date-time

    AutopsyWindowMetrics:
      type: object
      required: [totalTrades, winRate, profitFactor, sharpeRatio, maxDrawdown, totalPnl, exitReasons]
      properties:
        totalTrades: { type: integer }
        winRate: { type: number }
        profitFactor: { type: number }
        sharpeRatio: { type: number }
        maxDrawdown: { type: number }
        totalPnl: { type: number }
        exitReasons:
          type: object
          additionalProperties: { type: integer }

    AutopsyParams:
      type: object
      required: [confidenceThreshold, maxHoldingSeconds]
      properties:
        maxLossUsdt: { type: ["number", "null"] }
        targetProfitUsdt: { type: ["number", "null"] }
        confidenceThreshold: { type: number }
        maxHoldingSeconds: { type: number }

    AutopsyFinding:
      type: object
      required: [param, label, evidence, action]
      properties:
        param: { type: string }
        label: { type: string }
        current: { type: ["number", "null"] }
        suggested: { type: ["number", "null"] }
        evidence: { type: string }
        action: { type: string }

    AutopsyDiagnosis:
      type: object
      required: [verdict, summary, findings]
      properties:
        verdict:
          type: string
          enum: [improved, no_better, insufficient_data]
        summary: { type: string }
        findings:
          type: array
          items:
            $ref: "#/components/schemas/AutopsyFinding"

    AutopsyRun:
      type: object
      required: [id, displayNo, strategyId, symbols, timeframe, trainStart, trainEnd, valStart, valEnd, status, progress, totalBacktests, truncated, currentParams, createdAt]
      properties:
        id: { type: integer, description: "Global DB id — for links/API only, never shown as the run number." }
        displayNo: { type: integer, description: "Per-section run number (1..N) shown in the UI." }
        strategyId: { type: string }
        strategyName: { type: ["string", "null"] }
        symbols:
          type: array
          items: { type: string }
        timeframe: { type: string }
        trainStart: { type: string, format: date-time }
        trainEnd: { type: string, format: date-time }
        valStart: { type: string, format: date-time }
        valEnd: { type: string, format: date-time }
        status: { type: string, enum: [pending, running, completed, failed] }
        progress: { type: integer }
        stage: { type: ["string", "null"] }
        totalBacktests: { type: integer }
        truncated: { type: boolean }
        currentParams:
          $ref: "#/components/schemas/AutopsyParams"
        bestParams:
          oneOf:
            - $ref: "#/components/schemas/AutopsyParams"
            - type: "null"
        currentTrain:
          oneOf:
            - $ref: "#/components/schemas/AutopsyWindowMetrics"
            - type: "null"
        currentVal:
          oneOf:
            - $ref: "#/components/schemas/AutopsyWindowMetrics"
            - type: "null"
        bestTrain:
          oneOf:
            - $ref: "#/components/schemas/AutopsyWindowMetrics"
            - type: "null"
        bestVal:
          oneOf:
            - $ref: "#/components/schemas/AutopsyWindowMetrics"
            - type: "null"
        verdict: { type: ["string", "null"] }
        diagnosis:
          oneOf:
            - $ref: "#/components/schemas/AutopsyDiagnosis"
            - type: "null"
        error: { type: ["string", "null"] }
        createdAt: { type: string, format: date-time }
        completedAt: { type: ["string", "null"] }

    OandaCredentialsStatus:
      type: object
      required: [configured, accountIdPreview, updatedAt]
      properties:
        configured:
          type: boolean
        accountIdPreview:
          type: ["string", "null"]
          description: "Last 4 chars of the stored account id, e.g. \"...4567\" — never the full id or token."
        updatedAt:
          type: ["string", "null"]
          format: date-time

    BacktestRun:
      type: object
      required: [id, displayNo, strategyVersion, strategyName, symbols, timeframe, startDate, endDate, startingBalance, status, progress, createdAt]
      properties:
        id:
          type: integer
          description: "Global DB id — for links/API/export only, never shown as the run number."
        displayNo:
          type: integer
          description: "Per-section run number (1..N) shown in the UI."
        strategyVersion:
          type: string
        strategyName:
          type: string
        symbols:
          type: array
          items:
            type: string
        timeframe:
          type: string
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        startingBalance:
          type: number
        endingBalance:
          type: ["number", "null"]
        totalReturn:
          type: ["number", "null"]
        totalPnl:
          type: ["number", "null"]
        totalTrades:
          type: ["integer", "null"]
        winningTrades:
          type: ["integer", "null"]
        losingTrades:
          type: ["integer", "null"]
        winRate:
          type: ["number", "null"]
        profitFactor:
          type: ["number", "null"]
        sharpeRatio:
          type: ["number", "null"]
        sortinoRatio:
          type: ["number", "null"]
        maxDrawdown:
          type: ["number", "null"]
        averageWin:
          type: ["number", "null"]
        averageLoss:
          type: ["number", "null"]
        expectancy:
          type: ["number", "null"]
        largestWin:
          type: ["number", "null"]
        largestLoss:
          type: ["number", "null"]
        dailyReturns:
          nullable: true
        monthlyReturns:
          nullable: true
        strategyComparison:
          nullable: true
        effectiveConfig:
          nullable: true
          description: >-
            Diagnostic: the actual per-strategy stopLossPercent/takeProfitPercent,
            confidenceThreshold, and riskPercent used for this run — shape
            `{ summary: [...per-strategy], runLevelOverrides: {...} }` —
            computed before the simulation started (Phase 5A).
            See lib/backtestConfig.ts.
        params:
          nullable: true
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
        progress:
          type: integer
        error:
          type: ["string", "null"]
        aiAnalysis:
          nullable: true
        createdAt:
          type: string
          format: date-time

    BacktestTrade:
      type: object
      required: [id, runId, symbol, side, entryTime, entryPrice, quantity, stopLoss, takeProfit]
      properties:
        id:
          type: integer
        runId:
          type: integer
        symbol:
          type: string
        side:
          type: string
        strategyId:
          type: ["string", "null"]
        strategyName:
          type: ["string", "null"]
        entryTime:
          type: string
          format: date-time
        exitTime:
          type: ["string", "null"]
          format: date-time
        entryPrice:
          type: number
        exitPrice:
          type: ["number", "null"]
        quantity:
          type: number
        stopLoss:
          type: number
        takeProfit:
          type: number
        slPercent:
          type: ["number", "null"]
        tpPercent:
          type: ["number", "null"]
        fees:
          type: ["number", "null"]
        slippage:
          type: ["number", "null"]
        pnl:
          type: ["number", "null"]
        grossPnl:
          type: ["number", "null"]
        pnlPercent:
          type: ["number", "null"]
        confidence:
          type: ["number", "null"]
        exitReason:
          type: ["string", "null"]
        durationSeconds:
          type: ["integer", "null"]
        mfe:
          type: ["number", "null"]
        mae:
          type: ["number", "null"]
        riskReward:
          type: ["number", "null"]
        # ── Phase 7: trade-management ladder ────────────────────────────────
        tp1Price:
          type: ["number", "null"]
        tp1Filled:
          type: boolean
        tp1FillPrice:
          type: ["number", "null"]
        tp2Price:
          type: ["number", "null"]
        tp2Filled:
          type: boolean
        tp2FillPrice:
          type: ["number", "null"]
        breakEvenActive:
          type: boolean
        trailingStopActive:
          type: boolean
        trailingStopMode:
          type: ["string", "null"]

    EquityCurvePoint:
      type: object
      required: [timestamp, balance, drawdown]
      properties:
        timestamp:
          type: string
          format: date-time
        balance:
          type: number
        drawdown:
          type: number

    OptimizationResult:
      type: object
      required: [id, parameterSet, score, winRate, pnl, drawdown, profitFactor, totalTrades]
      properties:
        id:
          type: integer
        parameterSet:
          type: object
        score:
          type: number
        winRate:
          type: number
        pnl:
          type: number
        drawdown:
          type: number
        profitFactor:
          type: number
        totalTrades:
          type: integer

    BacktestDetail:
      type: object
      required: [run, trades, equityCurve, optimizationResults]
      properties:
        run:
          $ref: "#/components/schemas/BacktestRun"
        trades:
          type: array
          items:
            $ref: "#/components/schemas/BacktestTrade"
        equityCurve:
          type: array
          items:
            $ref: "#/components/schemas/EquityCurvePoint"
        optimizationResults:
          type: array
          items:
            $ref: "#/components/schemas/OptimizationResult"

    BacktestRunRequest:
      type: object
      required: [symbols, timeframe, startDate, endDate]
      properties:
        symbols:
          type: array
          items:
            type: string
        timeframe:
          type: string
          enum: ["1m","3m","5m","15m","30m","1h","4h","1d"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        startingBalance:
          type: number
          default: 1000
        confidenceThreshold:
          type: integer
          default: 65
        stopLossPercent:
          type: number
          default: 1.5
          description: "Stop-loss distance as a % below entry (Phase 5A — replaces atrMultiplierSl)"
        takeProfitPercent:
          type: number
          default: 2.5
          minimum: 0.3
          description: "Take-profit distance as a % above entry (Phase 5A — replaces atrMultiplierTp). Minimum clears round-trip trading costs — see lib/tradingCosts.ts."
        positionSizeUsdt:
          type: number
          default: 10
        maxOpenPositions:
          type: integer
          default: 5
        dailyLossLimitUsdt:
          type: number
          default: 50
        riskPercent:
          type: number
          default: 0
          description: >-
            0 = use each strategy's own configured risk% (no override).
            Any other value overrides risk% for every strategy in this run.
            (Bug fix: this field was already read by the backend but was
            missing from this schema and had no UI field — see CHANGES.md.)
        feeRate:
          type: number
          default: 0.001
        slippageRate:
          type: number
          default: 0.0005
        marketType:
          type: string
          enum: [spot, futures]
          default: spot
          description: "futures models isolated-margin liquidation (leverage affects liquidation risk only, not position size — matches live sizing)."
        leverage:
          type: integer
          minimum: 1
          maximum: 125
          default: 1
          description: "Futures leverage. Only affects liquidation risk in the backtest, not position size."
        marginMode:
          type: string
          enum: [isolated, cross]
          default: isolated
        riskModel:
          type: string
          enum: [percent, dollar]
          default: percent
          description: "dollar = size each trade from a fixed max-loss/target-profit (maxLossUsdt/targetProfitUsdt) using the SAME planner as the live engine, so the backtest reflects live dollar-model trading. percent (default) = %-based SL/TP as before."
        maxLossUsdt:
          type: number
          minimum: 0.01
          description: "Dollar mode only: max dollars to lose per trade (net of fees)."
        targetProfitUsdt:
          type: number
          minimum: 0.01
          description: "Dollar mode only: desired dollar profit per trade (net of fees)."
        onlyStrategyId:
          type: string
          description: "Test ONE strategy in isolation: it is force-enabled (even if disabled for live) and all others disabled for this run, using its own saved config (SL/TP or dollar plan). Omit to run every enabled strategy."
        perStrategyConfigs:
          type: boolean
          default: true
          description: "true (default): each strategy uses its own SL/TP/confidence, matching live. false: flatten every strategy to the run-level stopLossPercent/takeProfitPercent/confidenceThreshold (a single-config sweep). Ignored (forced true) when onlyStrategyId is set."
        rrRatio:
          type: number
          minimum: 0
          maximum: 10
          default: 0
          description: "Faithful mode only: reshape every strategy to TP = its own SL × this ratio (e.g. 3 → 1:3 reward:risk), keeping everything else per-strategy. 0 = off. The volatility-adaptive cap preserves the ratio when it shrinks targets."
        pureExits:
          type: boolean
          default: false
          description: "Faithful mode only: disable TP1 partials, break-even, and trailing stops so trades resolve only at the full SL or TP. Required to evaluate asymmetric-R:R styles, which the management layer otherwise clips at ~1R."
        holdMultiplier:
          type: number
          minimum: 0.1
          maximum: 100
          default: 1
          description: "Faithful mode only: multiply every strategy's maxHoldingSeconds (swing-profile test). Adaptive targets grow ~√hold, so per-trade moves get larger while the roughly-fixed per-trade fee shrinks in proportion. 1 = off."
        makerEntry:
          type: boolean
          default: false
          description: "Model entries as post-only MAKER limit orders instead of taker markets. The limit rests at the signal price and only becomes a position if a later candle trades through it within makerEntryFillWindowMinutes; otherwise the entry is MISSED. On fill there is no adverse entry slippage and the maker fee applies; take-profit exits (resting limits) are also charged the maker rate. Trades cheaper/better fills against missed trades — the honest way to test whether an edge survives real fees."
        makerFeeRate:
          type: number
          description: "Maker fee for passive fills (default when makerEntry is on: 0.0002 futures / 0.001 spot). Ignored unless makerEntry is on. Defaults to feeRate otherwise, so non-maker runs are unchanged."
        makerEntryFillWindowMinutes:
          type: integer
          minimum: 1
          maximum: 1440
          default: 30
          description: "How long a maker-entry limit rests before it's cancelled unfilled. Only used when makerEntry is on."

    OptimizeRequest:
      type: object
      required: [symbols, timeframe, startDate, endDate]
      properties:
        symbols:
          type: array
          items:
            type: string
        timeframe:
          type: string
          enum: ["1m","3m","5m","15m","30m","1h","4h","1d"]
        startDate:
          type: string
          format: date-time
        endDate:
          type: string
          format: date-time
        startingBalance:
          type: number
          default: 1000
        confidenceThresholds:
          type: array
          items:
            type: number
        stopLossPercents:
          type: array
          items:
            type: number
          description: "Stop-loss % values to grid-search (Phase 5A — replaces atrMultiplierSls)"
        takeProfitPercents:
          type: array
          items:
            type: number
          description: "Take-profit % values to grid-search (Phase 5A — replaces atrMultiplierTps)"
        positionSizeUsdts:
          type: array
          items:
            type: number
        rankBy:
          type: string
          enum: [pnl, profitFactor, sharpeRatio, winRate, maxDrawdown]
          default: profitFactor

    BacktestStarted:
      type: object
      required: [runId, status]
      properties:
        runId:
          type: integer
        status:
          type: string

    StrategyConfig:
      type: object
      required: [strategyId, enabled, riskPercent, confidenceThreshold, stopLossPercent, takeProfitPercent, maxHoldingSeconds, maxConcurrentPositions, cooldownMinutes]
      properties:
        strategyId:
          type: string
        enabled:
          type: boolean
        tradeAmountUsdt:
          type: ["number", "null"]
          description: "Dollar trade plan: spot notional / futures margin per trade. null → global positionSizeUsdt."
        maxLossUsdt:
          type: ["number", "null"]
          description: "Dollar trade plan: max dollars to lose on one trade (net of fees). With targetProfitUsdt set, this strategy trades the dollar risk model."
        targetProfitUsdt:
          type: ["number", "null"]
          description: "Dollar trade plan: desired dollar profit for one trade (net of fees)."
        riskPercent:
          type: number
          description: "% of account balance to risk per trade"
        confidenceThreshold:
          type: integer
          description: "Minimum confidence score 0–100 required to enter"
        stopLossPercent:
          type: number
          description: "Stop-loss distance as a % below entry price (Phase 5A — replaces atrMultiplierSl)"
        takeProfitPercent:
          type: number
          description: "Take-profit distance as a % above entry price (Phase 5A — replaces atrMultiplierTp)"
        maxHoldingSeconds:
          type: integer
        maxConcurrentPositions:
          type: integer
        cooldownMinutes:
          type: integer
        breakEvenRMultiple:
          description: "Pre-TP1 break-even arm: at this many R of unrealized profit the stop moves to entry — the trade can no longer lose. 0 disables."
          type: number
        tp1RMultiple:
          description: "R-multiple at which TP1 banks a partial and moves the stop to break-even. 0 = single TP."
          type: number

    StrategyConfigUpdate:
      type: object
      properties:
        enabled:
          type: boolean
        tradeAmountUsdt:
          type: ["number", "null"]
          description: "null clears the field (fall back to global positionSizeUsdt)."
        maxLossUsdt:
          type: ["number", "null"]
          description: "null clears the dollar plan (strategy reverts to %-based SL/TP)."
        targetProfitUsdt:
          type: ["number", "null"]
          description: "null clears the dollar plan (strategy reverts to %-based SL/TP)."
        riskPercent:
          type: number
        confidenceThreshold:
          type: integer
        stopLossPercent:
          type: number
        takeProfitPercent:
          type: number
          minimum: 0.3
        maxHoldingSeconds:
          type: integer
        maxConcurrentPositions:
          type: integer
        cooldownMinutes:
          type: integer
        breakEvenRMultiple:
          description: "Pre-TP1 break-even arm: at this many R of unrealized profit the stop moves to entry — the trade can no longer lose. 0 disables."
          type: number
        tp1RMultiple:
          description: "R-multiple at which TP1 banks a partial and moves the stop to break-even. 0 = single TP."
          type: number

    StrategyPerformance:
      type: object
      required: [totalTrades, winningTrades, losingTrades, totalPnl, avgWin, avgLoss, avgDurationSeconds]
      properties:
        totalTrades:
          type: integer
        winningTrades:
          type: integer
        losingTrades:
          type: integer
        winRate:
          type: ["number", "null"]
        totalPnl:
          type: number
        avgWin:
          type: number
        avgLoss:
          type: number
        avgDurationSeconds:
          type: number

    StrategyInfo:
      type: object
      required: [strategyId, strategyName, supportedRegimes, indicators, decisionMaker, config, performance]
      properties:
        strategyId:
          type: string
        strategyName:
          type: string
        supportedRegimes:
          type: array
          items:
            type: string
        indicators:
          description: The indicators this strategy reads, human-readable with timeframe.
          type: array
          items:
            type: string
        decisionMaker:
          description: True when the strategy is a native decision-maker owning its full TradePlan (leverage, structural stop, duration, written reasoning).
          type: boolean
        config:
          $ref: "#/components/schemas/StrategyConfig"
        performance:
          $ref: "#/components/schemas/StrategyPerformance"
        custom:
          description: True when this is a user-built custom strategy (no-code builder), not a built-in.
          type: boolean
        customId:
          description: The custom strategy's numeric id (for /custom-strategies/{id} CRUD). Present only when custom.
          type: integer
        backtested:
          description: Custom strategies only — true once a single-strategy backtest of the CURRENT rules has completed (required before live enable).
          type: boolean

    CustomStrategyCondition:
      type: object
      required: [indicator, op, value]
      properties:
        indicator:
          description: One of the builder's indicator vocabulary ids (rsi, adx, atrPercent, macdHistogram, volumeRatio, confidence, shortConfidence, lastPrice, hourUtc, pctFromHigh20, pctFromLow20, regime, macroBullish, macroBearish, ema20AboveEma50).
          type: string
        op:
          description: Comparison — gt/gte/lt/lte for numeric indicators, eq for enum/boolean ones.
          type: string
          enum: [gt, gte, lt, lte, eq]
        value:
          description: Number for numeric indicators; string for enum/boolean ones ("true"/"false" or a regime name).
          oneOf:
            - type: number
            - type: string

    CustomStrategyStop:
      type: object
      required: [mode]
      properties:
        mode:
          type: string
          enum: [atr, percent, swing]
        atrMult:
          description: atr mode — stop at N × ATR from entry (0.5–10).
          type: number
        pct:
          description: percent mode — fixed % distance from entry (0.05–20).
          type: number
        lookback:
          description: swing mode — lowest low / highest high of the last N 15m bars (3–50).
          type: integer

    CustomStrategyRules:
      type: object
      required: [stop, confidence]
      properties:
        long:
          description: AND-list of conditions that must ALL hold to propose a long. Omit to disable longs.
          type: array
          items:
            $ref: "#/components/schemas/CustomStrategyCondition"
        short:
          description: AND-list of conditions that must ALL hold to propose a short. Omit to disable shorts.
          type: array
          items:
            $ref: "#/components/schemas/CustomStrategyCondition"
        stop:
          $ref: "#/components/schemas/CustomStrategyStop"
        confidence:
          description: Static plan confidence (50–95); the per-strategy confidence threshold still applies on top.
          type: number

    CustomStrategy:
      type: object
      required: [id, strategyId, section, name, rules, indicators, rulesValid, backtested, rulesUpdatedAt, createdAt, updatedAt]
      properties:
        id:
          type: integer
        strategyId:
          description: Engine-facing id, custom_<id> — the key used on /strategies, backtests and autopsies.
          type: string
        section:
          type: string
          enum: [crypto, forex]
        name:
          type: string
        description:
          type: string
          nullable: true
        rules:
          $ref: "#/components/schemas/CustomStrategyRules"
        indicators:
          description: Human-readable rendering of the rules ("LONG when RSI < 30 …").
          type: array
          items:
            type: string
        rulesValid:
          type: boolean
        backtested:
          description: True once a single-strategy backtest of the CURRENT rules completed. Editing rules resets this — and live enablement requires it.
          type: boolean
        lastBacktestAt:
          type: string
          format: date-time
          nullable: true
        rulesUpdatedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CustomStrategyCreate:
      type: object
      required: [name, rules]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
        description:
          type: string
          maxLength: 500
        rules:
          $ref: "#/components/schemas/CustomStrategyRules"

    CustomStrategyUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 60
        description:
          type: string
          maxLength: 500
          nullable: true
        rules:
          $ref: "#/components/schemas/CustomStrategyRules"

    StrategySignalItem:
      type: object
      required: [symbol, confidence, regime, lastPrice, status]
      properties:
        symbol:
          type: string
        strategyId:
          type: string
        strategyName:
          type: string
        confidence:
          type: number
        regime:
          type: string
        lastPrice:
          type: number
        adx:
          type: number
        rsi:
          type: number
        volumeRatio:
          type: number
        status:
          type: string
        entryReason:
          type: string
