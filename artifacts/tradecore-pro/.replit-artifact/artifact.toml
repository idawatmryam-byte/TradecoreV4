kind = "web"
previewPath = "/"
title = "TradeCore Pro"
version = "1.0.0"
id = "artifacts/tradecore-pro"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19691

[services.development]
run = "pnpm --filter @workspace/tradecore-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tradecore-pro", "run", "build" ]
serve = "static"
publicDir = "artifacts/tradecore-pro/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19691"
BASE_PATH = "/"
